name: clipboard_ai_manager
description: Clipboard history manager with AI-ready backend integration scaffolded for Flutter.
version: 0.1.0+1
environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  http: ^1.2.2
  path: ^1.9.0
  json_annotation: ^4.9.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  sqflite: ^2.3.3+1
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
